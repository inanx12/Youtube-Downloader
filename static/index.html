<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader</title>
    <style>
        :root {
            --bg: #000000;
            --surface: #1c1c1e;
            --surface-elevated: #2c2c2e;
            --border: rgba(255,255,255,0.08);
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --text-tertiary: #636366;
            --accent: #0a84ff;
            --accent-hover: #409cff;
            --accent-muted: rgba(10,132,255,0.15);
            --danger: #ff453a;
            --danger-bg: rgba(255,69,58,0.12);
            --success: #30d158;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-pill: 100px;
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 15px;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 48px 20px;
        }

        .app {
            width: 100%;
            max-width: 680px;
        }

        /* ── Header ── */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 6px;
        }
        .header p {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 400;
        }

        /* ── URL Input ── */
        .url-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 6px 6px 6px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            transition: border-color var(--transition), box-shadow var(--transition);
        }
        .url-card:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-muted);
        }
        .url-card svg {
            flex-shrink: 0;
            color: var(--text-tertiary);
            width: 18px;
            height: 18px;
        }
        .url-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            padding: 10px 0;
        }
        .url-input::placeholder {
            color: var(--text-tertiary);
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-pill);
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background var(--transition), transform var(--transition), opacity var(--transition);
            white-space: nowrap;
        }
        .btn-primary:hover:not(:disabled) {
            background: var(--accent-hover);
        }
        .btn-primary:active:not(:disabled) {
            transform: scale(0.96);
        }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ── Error ── */
        .error-msg {
            background: var(--danger-bg);
            border: 1px solid rgba(255,69,58,0.2);
            border-radius: var(--radius-md);
            padding: 14px 18px;
            color: var(--danger);
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        /* ── Single Video Info ── */
        .video-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 24px;
            transition: opacity var(--transition-slow), transform var(--transition-slow);
        }
        .video-card img {
            width: 100%;
            display: block;
            aspect-ratio: 16/9;
            object-fit: cover;
        }
        .video-card .info {
            padding: 20px;
        }
        .video-card .info h2 {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 4px;
        }
        .video-card .info p {
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* ── Playlist Info ── */
        .playlist-header {
            margin-bottom: 16px;
        }
        .playlist-header h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 2px;
        }
        .playlist-header p {
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* ── Resolution Pills ── */
        .resolution-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        .pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }
        .pill {
            background: transparent;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-pill);
            padding: 7px 18px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition);
        }
        .pill:hover:not(.pill-active):not(:disabled) {
            border-color: var(--text-tertiary);
            color: var(--text-primary);
        }
        .pill-active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .pill:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* ── Playlist List ── */
        .list-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 20px;
        }
        .list-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
        }
        .list-toolbar label {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .list-toolbar label input {
            accent-color: var(--accent);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .list-toolbar .count {
            font-size: 13px;
            color: var(--text-tertiary);
            font-weight: 500;
        }
        .list-body {
            max-height: 420px;
            overflow-y: auto;
        }
        .list-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background var(--transition);
        }
        .list-item:last-child { border-bottom: none; }
        .list-item:hover { background: rgba(255,255,255,0.03); }
        .list-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            flex-shrink: 0;
            cursor: pointer;
        }
        .list-item .thumb {
            width: 88px;
            height: 50px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            flex-shrink: 0;
            background: var(--surface-elevated);
        }
        .list-item .thumb-placeholder {
            width: 88px;
            height: 50px;
            border-radius: var(--radius-sm);
            background: var(--surface-elevated);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-tertiary);
            font-size: 11px;
            flex-shrink: 0;
        }
        .list-item .meta {
            flex: 1;
            min-width: 0;
        }
        .list-item .meta .title {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }
        .list-item .meta .dur {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 2px;
        }

        /* ── Progress ── */
        .progress-area {
            margin-bottom: 24px;
        }
        .progress-track {
            width: 100%;
            height: 6px;
            background: var(--surface-elevated);
            border-radius: var(--radius-pill);
            overflow: hidden;
            margin-bottom: 12px;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent);
            border-radius: var(--radius-pill);
            transition: width 0.3s ease;
        }
        .progress-bar.processing {
            background: linear-gradient(90deg, var(--accent) 0%, var(--accent-hover) 50%, var(--accent) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
            width: 100% !important;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .progress-text {
            font-size: 14px;
            color: var(--text-secondary);
            min-height: 22px;
            margin-bottom: 4px;
        }
        .progress-detail {
            font-size: 13px;
            color: var(--text-tertiary);
            min-height: 20px;
        }

        /* ── Result ── */
        .result-area {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            transition: opacity var(--transition-slow), transform var(--transition-slow);
        }
        .result-area h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .result-area .summary-line {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .result-area .failures {
            margin-top: 12px;
            background: var(--danger-bg);
            border: 1px solid rgba(255,69,58,0.15);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            font-size: 13px;
            color: var(--danger);
            line-height: 1.6;
        }
        .result-area .failures div {
            margin-bottom: 2px;
        }
        .result-area .failures div:last-child {
            margin-bottom: 0;
        }
        .result-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .btn-secondary {
            background: var(--surface-elevated);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-pill);
            padding: 9px 22px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.06);
            border-color: var(--text-tertiary);
        }
        .btn-secondary:active {
            transform: scale(0.96);
        }

        /* ── Video links list ── */
        .video-links {
            margin-top: 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
            max-height: 300px;
            overflow-y: auto;
        }
        .vlink-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            color: var(--text-primary);
            transition: background var(--transition);
        }
        .vlink-row:last-child { border-bottom: none; }
        .vlink-row:hover { background: rgba(255,255,255,0.03); }
        .vlink-row button {
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 600;
        }

        /* ── Utilities ── */
        .hidden { display: none !important; }
        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 520px) {
            body { padding: 24px 16px; }
            .header h1 { font-size: 24px; }
            .url-card { padding: 4px 4px 4px 14px; }
            .btn-primary { padding: 9px 18px; font-size: 13px; }
            .list-item .thumb, .list-item .thumb-placeholder { width: 72px; height: 40px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>YouTube Downloader</h1>
            <p>Download videos and playlists up to 4K</p>
        </div>

        <div id="error" class="hidden error-msg"></div>

        <div class="url-card">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="url" class="url-input" placeholder="Paste a YouTube URL…" autocomplete="off">
            <button id="fetchBtn" class="btn-primary">Fetch</button>
        </div>

        <!-- Single video card -->
        <div id="videoCard" class="hidden video-card">
            <img id="videoThumb" src="" alt="" onerror="this.style.display='none'">
            <div class="info">
                <h2 id="videoTitle">Title</h2>
                <p id="videoMeta">Meta</p>
            </div>
        </div>

        <!-- Playlist header -->
        <div id="playlistHeader" class="hidden playlist-header">
            <h2 id="playlistTitle">Playlist</h2>
            <p id="playlistMeta">0 videos</p>
        </div>

        <!-- Resolution selector -->
        <div id="resolutionArea" class="hidden">
            <div class="resolution-label">Quality</div>
            <div id="resolutionPills" class="pills"></div>
        </div>

        <!-- Playlist list -->
        <div id="playlistListCard" class="hidden list-card">
            <div class="list-toolbar">
                <label><input type="checkbox" id="selectAll"> Select all</label>
                <span id="selectedCount" class="count">0 selected</span>
            </div>
            <div id="playlistList" class="list-body"></div>
        </div>

        <!-- Download button (single or playlist) -->
        <div id="downloadArea" class="hidden" style="margin-bottom: 24px;">
            <button id="downloadBtn" class="btn-primary" disabled>Download</button>
        </div>

        <!-- Progress -->
        <div id="progressArea" class="hidden progress-area">
            <div class="progress-track">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <div id="progressText" class="progress-text"></div>
            <div id="progressDetail" class="progress-detail"></div>
        </div>

        <!-- Result -->
        <div id="resultArea" class="hidden result-area">
            <div id="resultContent"></div>
            <div id="resultActions" class="result-actions"></div>
            <div id="videoLinks" class="hidden video-links"></div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
